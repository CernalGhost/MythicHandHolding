name: Bug report
description: Something is broken or not working as expected
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please search [open issues](https://github.com/CernalGhost/MythicHandHolding/issues) first.
  - type: input
    id: version
    attributes:
      label: Mythic Hand Holding version
      description: Output of `/mhh ping`
      placeholder: "1.0.32"
    validations:
      required: true
  - type: input
    id: wow-version
    attributes:
      label: WoW client version
      placeholder: "e.g. 11.2.7"
    validations:
      required: true
  - type: input
    id: dungeon
    attributes:
      label: Dungeon / instance
      placeholder: "e.g. Eco-Dome Al'dani"
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: What actually happened
    validations:
      required: true
  - type: textarea
    id: errors
    attributes:
      label: Lua errors (if any)
  - type: textarea
    id: extra
    attributes:
      label: Anything else
      description: Test mode on/off, plain text setting, `/mhh debug` output
